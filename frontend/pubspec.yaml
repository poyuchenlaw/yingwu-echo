name: yingwu_echo
description: 應物 ECHO — Soul Writing Monster Collector
version: 0.6.2+11
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0
  uuid: ^4.4.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sprites/
    - assets/portraits/
    - assets/ui/
    - assets/items/
    - assets/scenes/
    - assets/species_pinyin_map.json
    - assets/species_lore.json
    - assets/style_spec.json
